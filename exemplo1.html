<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de compras</title>

    <script>
        window.onload = inicio;
        let listaItens = [];

        function inicio() {
            let botao = document.getElementById('btnAdiciona');
            botao.addEventListener('click', adicionar);
        }

        function adicionar() {
            let campoItem = document.getElementById('item');
            let texto = campoItem.value;

            listaItens.push([false, texto]);
            atualizar();

        }    


        function atualizar() {
            let lista = document.getElementById('lista');
            lista.innerHTML = "";
            for (let i = 0; i < listaItens.length; i++) {
                lista.innerHTML += "<li>" + listaItens[i][1] + "</li >";
            }

            let quantidade = document.getElementById('quantidade');
            quantidade.innerHTML = listaItens.length;
            console.log(listaItens.length);
            
        }

        

    </script>
</head>

<body>
    <label for="">Item:</label>
    <input type="text" id="item"><br>
    <button id="btnAdiciona">Adicionar</button>
    <ul id="lista"></ul>
    <p id="quantidade"> 0 </p>
</body>

</html>
