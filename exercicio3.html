<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Treino Darebee - Dia 1</title>
    <script>
        window.onload = inicio;

        let listaExercicios = [
            [false, "High crunches"],
            [false, "Cross crunches"],
            [false, "Circles crunches"],
            [false, "Sitting twists"],
            [false, "Heel taps"]
        ];

        function inicio() {
            let botaoAdicionar = document.getElementById('btnAdiciona');
            botaoAdicionar.addEventListener('click', adicionar);

            let botaoRemover = document.getElementById('btnRemove');
            botaoRemover.addEventListener('click', remover);

        
            atualizar();
        }

        function adicionar() {
            let campoItem = document.getElementById('item');
            let texto = campoItem.value;
            
            
            listaExercicios.push([false, texto]);
            atualizar();
            campoItem.value = "";
        }

        function remover() {
            let campoNumero = document.getElementById('numero');
            let numeroDigitado = Number(campoNumero.value);

            
            let contadorVisivel = 0;
            
            for (let i = 0; i < listaExercicios.length; i++) {
                
                if (listaExercicios[i][0] == false) {
                    contadorVisivel++;
                    
                    
                    if (contadorVisivel == numeroDigitado) {
                        listaExercicios[i][0] = true;
                        break; 
                    }
                }
            }
            
            atualizar();
            campoNumero.value = ""; 
        }

        function atualizar() {
            let lista = document.getElementById('listaExercicios');
            let listaFeitos = document.getElementById('listaExerciciosFeitos');

            lista.innerHTML = "";
            listaFeitos.innerHTML = "";

            for (let i = 0; i < listaExercicios.length; i++) {
                if (listaExercicios[i][0] == false) {
                    lista.innerHTML += "<li>" + listaExercicios[i][1] + "</li>";
                } else {
                    listaFeitos.innerHTML += "<li>" + listaExercicios[i][1] + "</li>";
                }
            }
        }
    </script>
</head>

<body>
    <label for="">Item:</label>
    <input type="text" id="item"><br>
    <button id="btnAdiciona">Adicionar</button>
    
    <h2>Exercícios:</h2>
    <ol id="listaExercicios"></ol>
    
    <label for="">Concluir (digite o número da linha):</label>
    <input type="number" id="numero" min="1"><br>
    <button id="btnRemove">Feito</button>
    <h2>Exercícios Feitos:</h2>
    <ul id="listaExerciciosFeitos"></ul>
</body>

</html>
